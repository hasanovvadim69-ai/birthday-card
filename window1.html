<body>

</div>

    <!-- Галерея -->

      <!-- Первый ряд: 4 фото -->

        <img src="ramka1.jpg" alt="Фото 1" class="photo-frame">
        <img src="ramka2.jpg" alt="Фото 2" class="photo-frame">

        <img src="ramka9.jpg" alt="Фото 9" class="photo-frame">
      </div>
    </div>
  </div>

<div class="sparkles"></div>

<script>
const sparklesContainer = document.querySelector('.sparkles');

function createSparkle() {
  const sparkle = document.createElement('div');
  sparkle.classList.add('sparkle');
  
  // случайная позиция и размер
  sparkle.style.left = Math.random() * window.innerWidth + 'px';
  sparkle.style.width = sparkle.style.height = (Math.random() * 6 + 4) + 'px';
  
  sparklesContainer.appendChild(sparkle);

  // удалить после анимации
  setTimeout(() => {
    sparkle.remove();
  }, 5000);
}

// запуск блёсток каждые 500 мс
setInterval(createSparkle, 500);
</script>
