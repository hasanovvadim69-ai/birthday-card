<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Greeting</title>
  <!-- Подключение Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="2okno.css">
</head>
<body>
  <div class="left">
    <img src="cake.png" alt="Cake">
  </div>
  <div class="right">
    <div class="text-overlay">
      <h1>HAPPY</h1>
      <h1>BIRTHDAY</h1>
      <p>MY DEAR</p>
    <img src="lenta.png" alt="Ribbon" class="ribbon">

    <div class="extra-text">
    <p>ХОЧЕШЬ ПОСМОТРЕТЬ ЧТО Я ПОДГОТОВИЛ ДЛЯ ТЕБЯ?</p>
    <div class="buttons">
      <button class="btn-yes" id="btnYes">Да</button>
      <button class="btn-no">Нет</button>
    </div>
  </div>


  <!-- Модальное окно -->
<div id="modal" class="modal">
 <div class="modal-content">
  <img src="mem.png" alt="Funny Meme">
  <p class="instant-text">А фиг тебе 😝</p>
</div>


</div>
 <script src="2okno.js"></script>
    </div>
  </div>
</body>
</html>
